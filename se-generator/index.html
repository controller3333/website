<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>効果音ノードジェネレーター</title>
  <link rel="stylesheet" href="./styles.css?v=20260621-procedural">
</head>
<body>
  <div class="app">
    <header class="toolbar">
      <div class="brand">
        <span class="brand-mark"></span>
        <span>効果音ノードジェネレーター</span>
      </div>
      <button id="playBtn" class="primary">再生</button>
      <button id="stopBtn">停止</button>
      <label class="field compact">長さ <input id="lengthInput" type="number" min="0.05" max="20" step="0.05" value="1.2"></label>
      <label class="field compact">レート
        <select id="rateSelect">
          <option value="44100">44.1k</option>
          <option value="48000">48k</option>
          <option value="32000">32k</option>
          <option value="22050">22.05k</option>
        </select>
      </label>
      <label class="check"><input id="loopCheck" type="checkbox"> ループ</label>
      <label class="check"><input id="autoCheck" type="checkbox" checked> 自動</label>
      <button id="renderBtn">生成</button>
      <button id="wavBtn">WAV</button>
      <div class="spacer"></div>
      <select id="presetSelect" class="preset-select"></select>
      <button id="loadBtn">読込</button>
      <button id="saveBtn">保存</button>
      <button id="openBtn">開く</button>
      <button id="clearBtn">消去</button>
      <input id="openFile" type="file" accept=".json,application/json" hidden>
    </header>

    <main class="main">
      <aside class="palette" id="palette"></aside>
      <section class="workspace-wrap">
        <div id="workspace" class="workspace">
          <div id="world" class="world">
            <svg id="wires" class="wires"></svg>
            <div id="nodes" class="nodes"></div>
          </div>
        </div>
      </section>
    </main>

    <footer class="bottom">
      <canvas id="waveform" width="960" height="112"></canvas>
      <div id="status" class="status">準備完了</div>
    </footer>
  </div>

  <script src="./app.js?v=20260621-procedural"></script>
</body>
</html>
